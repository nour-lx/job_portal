<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Job Portal</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
	crossorigin="anonymous">
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>


	<nav class="navbar navbar-expand-lg navbar-light bg-clr">
		<div class="container">
			<a class="navbar-brand fs-1 fw-medium " href="home">Job
				Portal Web App</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="home">Home</a>
					</li>
					<li class="nav-item"><a class="nav-link" href="viewalljobs">All
							Jobs</a></li>

					<li class="nav-item"><a class="nav-link"
						href="https://www.linkedin.com/in/nour-lx/">Contact</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container mt-5">
		<div class="row">
			<div class="col-md-6 mb-5">
				<div class="card home-card" onclick="window.location.href='/viewalljobs'">
					<div class="card-body">
						<h5 class="card-title">View All Jobs</h5>
						<p class="text-secondary mt-3">Browse our current openings and find your next career move.</p>
					</div>
				</div>
			</div>

			<div class="col-md-6 mb-5">
				<div class="card home-card" onclick="window.location.href='/addjob'">
					<div class="card-body">
						<h5 class="card-title">Add New Job</h5>
						<p class="text-secondary mt-3">Post a new position and find the perfect candidate today.</p>
					</div>
				</div>
			</div>
		</div>
	</div>
	</div>


	<!-- Add the Bootstrap JS and Popper.js scripts -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
		crossorigin="anonymous"></script>
</body>
</html>
